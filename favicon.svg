<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <!-- Background Circle with sleek Violet-to-Indigo Tech Gradient -->
    <defs>
        <linearGradient id="techGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#7c3aed" />
            <stop offset="100%" stop-color="#4f46e5" />
        </linearGradient>
    </defs>
    
    <!-- Squircle Smooth Rounded Background (iOS Aesthetic) -->
    <rect width="100" height="100" rx="30" fill="url(#techGradient)" />
    
    <!-- Self-Closing Dev Tag Layout for <R /> -->
    <text x="50%" y="62%" 
          font-family="'JetBrains Mono', monospace" 
          font-size="34" 
          font-weight="900" 
          fill="#ffffff" 
          text-anchor="middle" 
          letter-spacing="-1">&lt;R /&gt;</text>
</svg>
